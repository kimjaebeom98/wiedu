# Production Configuration (Railway)
spring:
  application:
    name: wiedu-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Database (Railway MySQL)
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

# Server
server:
  port: ${PORT:8080}
  address: 0.0.0.0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 3600000
  refresh-token-validity: 1209600000
  issuer: wiedu

# Kakao OAuth
kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}

# File Upload Configuration
# Railway Volume mount path: /data (Volume 생성 후 mount path를 /data로 설정)
file:
  upload-dir: ${FILE_UPLOAD_DIR:/data/uploads}
  max-size: 10485760
  allowed-types: image/jpeg,image/png,image/webp
  base-url: ${FILE_BASE_URL}

# Mail Configuration (Gmail SMTP)
spring.mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      debug: false
      smtp:
        auth: true
        ssl:
          enable: false
        starttls:
          enable: true
          required: true
        connectiontimeout: 10000
        timeout: 10000
        writetimeout: 10000

# Logging (Production)
logging:
  level:
    com.wiedu: INFO
    org.hibernate.SQL: WARN
